<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis Synergy Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      window.addEventListener("error", function () {
        if (!window.React || !window.ReactDOM || !window.Babel) {
          const root = document.getElementById("root");
          if (root) {
            root.innerHTML =
              '<div style="font-family:Arial,sans-serif;padding:20px;max-width:700px;margin:40px auto;background:#fff;border:1px solid #e4ebf2;border-radius:12px;">' +
              "<h2>Unable to load app dependencies</h2>" +
              "<p>This page needs internet access to load React and Babel CDN files. Please try again with internet enabled, or run it with a local dev server.</p>" +
              "</div>";
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useMemo, useState } = React;

      const products = [
        "Synergy Portal",
        "Practice Deep Learn",
        "360 DeepLearn",
        "Referral Management",
        "AI Bot",
        "MIPS",
      ];

      function LoginView({ onSelectRole }) {
        return (
          <div className="center-wrap">
            <div className="card">
              <h1>Sign In</h1>
              <p>Select your role to continue</p>
              <div className="role-list">
                <button className="btn-primary" onClick={() => onSelectRole("user")}>
                  User
                </button>
                <button className="btn-soft" onClick={() => onSelectRole("admin")}>
                  Admin
                </button>
                <button className="btn-soft" onClick={() => onSelectRole("vendor")}>
                  Vendor
                </button>
              </div>
            </div>
          </div>
        );
      }

      function TopBar({ onLogout }) {
        return (
          <header className="topbar">
            <div className="logo">
              <img
                className="logo-image"
                src="file:///C:/Users/jyoth/.cursor/projects/c-Users-jyoth-OneDrive-Desktop/assets/c__Users_jyoth_AppData_Roaming_Cursor_User_workspaceStorage_1f1af9929025c4ec588074ead5eb3e22_images_Screenshot_2026-04-10_094925-18c39d4f-ea34-4415-b33f-fe62e71c1282.png"
                alt="Genesis Synergy Network logo"
              />
            </div>
            <nav className="nav-icons" aria-label="Main navigation">
              <button className="icon-btn" title="Home" aria-label="Home">
                Home
              </button>
              <button className="icon-btn" title="Support" aria-label="Support">
                Support
              </button>
              <button className="icon-btn" title="Profile" aria-label="Profile">
                My Profile
              </button>
            </nav>
            <button className="btn-soft" onClick={onLogout}>
              Sign Out
            </button>
          </header>
        );
      }

      function UserDashboard({ onLogout }) {
        const productCards = useMemo(
          () =>
            products.map((product) => (
              <article className="product-card" key={product}>
                <div>
                  <h4>{product}</h4>
                  <p>
                    Explore {product} to view tools, insights, and workflow options in this
                    demo marketplace.
                  </p>
                </div>
                <button className="btn-primary">Open</button>
              </article>
            )),
          []
        );

        return (
          <div className="dashboard">
            <TopBar onLogout={onLogout} />
            <section className="section">
              <h3>Available Products</h3>
              <div className="products">{productCards}</div>
            </section>
          </div>
        );
      }

      function PlaceholderDashboard({ title, onLogout }) {
        return (
          <div className="center-wrap">
            <div className="placeholder-view">
              <h2>{title}</h2>
              <p>This is a placeholder dashboard for demo navigation.</p>
              <div className="top-actions">
                <button className="btn-primary" onClick={onLogout}>
                  Back to Sign In
                </button>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [role, setRole] = useState(null);

        const handleRoleSelect = (selectedRole) => setRole(selectedRole);
        const handleLogout = () => setRole(null);

        if (!role) {
          return <LoginView onSelectRole={handleRoleSelect} />;
        }

        if (role === "admin") {
          return <PlaceholderDashboard title="Admin Dashboard" onLogout={handleLogout} />;
        }

        if (role === "vendor") {
          return <PlaceholderDashboard title="Vendor Dashboard" onLogout={handleLogout} />;
        }

        return <UserDashboard onLogout={handleLogout} />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <React.StrictMode>
          <div className="app-shell">
            <App />
          </div>
        </React.StrictMode>
      );
    </script>
  </body>
</html>
